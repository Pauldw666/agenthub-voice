<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101820">
    <title>AgentHub Voice</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AgentHub</p>
          <h1>语音任务中枢</h1>
        </div>
        <span id="connectionState" class="state-pill">未连接</span>
      </header>

      <section class="command-panel" aria-labelledby="commandTitle">
        <div class="section-heading">
          <h2 id="commandTitle">新任务</h2>
          <select id="languageSelect" aria-label="识别语言">
            <option value="zh-CN">普通话</option>
            <option value="en-US">English</option>
          </select>
        </div>

        <div class="target-row" role="group" aria-label="任务目标">
          <button class="target-button is-active" data-target="auto" type="button">自动判断</button>
          <button class="target-button" data-target="windows" type="button">Win</button>
          <button class="target-button" data-target="mac" type="button">Mac</button>
          <button class="target-button" data-target="both" type="button">两边</button>
        </div>

        <textarea id="commandText" rows="7" placeholder="按住语音，或直接输入：Win检查家里电脑是否在线，然后一句话报告。"></textarea>

        <div class="action-row">
          <button id="listenButton" class="primary-button" type="button">开始语音</button>
          <button id="submitButton" class="submit-button" type="button">提交任务</button>
        </div>

        <p id="speechHint" class="hint"></p>
        <p id="submitStatus" class="status-line" role="status"></p>
      </section>

      <section class="settings-panel" aria-labelledby="settingsTitle">
        <div class="section-heading">
          <h2 id="settingsTitle">GitHub 提交设置</h2>
          <button id="toggleSettings" class="plain-button" type="button">收起</button>
        </div>

        <div id="settingsBody" class="settings-grid">
          <label>
            GitHub Token
            <input id="tokenInput" type="password" autocomplete="off" placeholder="只保存在本机浏览器">
          </label>
          <label>
            Owner
            <input id="ownerInput" type="text" autocomplete="off" value="Pauldw666">
          </label>
          <label>
            Repo
            <input id="repoInput" type="text" autocomplete="off" value="codex-agenthub">
          </label>
          <label>
            Branch
            <input id="branchInput" type="text" autocomplete="off" value="main">
          </label>
          <div class="settings-actions">
            <button id="saveSettings" class="secondary-button" type="button">保存设置</button>
            <button id="clearToken" class="plain-button danger" type="button">清除 Token</button>
          </div>
        </div>
      </section>

      <section class="recent-panel" aria-labelledby="recentTitle">
        <div class="section-heading">
          <h2 id="recentTitle">手机命令</h2>
          <button id="refreshInbox" class="plain-button" type="button">刷新</button>
        </div>
        <pre id="quickCommands" class="quick-list">尚未读取</pre>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
